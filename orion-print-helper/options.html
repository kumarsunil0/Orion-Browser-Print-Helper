<!DOCTYPE html>
<html>
<head>
    <title>Orion Print Helper Settings</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff 0%, #007AFF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#add-btn:hover {
            opacity: 0.9;
        }

        .domain-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .domain-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
        }

        .domain-item span {
            font-family: monospace;
            font-size: 14px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #FF453A;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .remove-btn:hover {
            opacity: 1;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <p class="subtitle">Add domains where the Print Helper should be active. (e.g. <i>delhivery.com</i>)</p>
        
        <div class="input-group">
            <input type="text" id="domain-input" placeholder="Enter domain...">
            <button id="add-btn">Add</button>
        </div>

        <ul class="domain-list" id="domain-list">
            <!-- List items will be added here -->
        </ul>

        <div class="footer">
            Orion Print Helper &bull; v1.6
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
